<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About - Social Launch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Social Launch</h1>
    <nav aria-label="Primary">
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>About Our Platform</h2>
    <p>Social Launch empowers entrepreneurs with sustainable, scalable solutions to social challenges.</p>

    <section>
      <h3>Our Talent Form</h3>
      <form action="#" method="post" class="about-form" aria-label="Apply as a social entrepreneur">
        <fieldset>
          <legend>Pitch Your Social Venture</legend>
          <div class="field-row">
            <label for="entrepreneur-name">Name</label>
            <input type="text" id="entrepreneur-name" name="entrepreneur-name" required />
          </div>
          <div class="field-row">
            <label for="venture-name">Venture Name</label>
            <input type="text" id="venture-name" name="venture-name" required />
          </div>
          <div class="field-row">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" required></textarea>
          </div>
          <button type="submit">Submit Pitch</button>
        </fieldset>
      </form>
    </section>
  </main>

  <footer>
    <p>Designed by Afonso Conde</p>
  </footer>
</body>
</html>
